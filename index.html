<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- 引入 encoding.js 以支持 GBK 编码 -->
    <script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2.0.0/encoding.min.js"></script>
    <!-- 内嵌 ESC/POS 编码库 (增强中文支持) -->
    <script>
        (function(global, factory) {
            typeof exports === 'object' && typeof module !== 'undefined' ? module.exports = factory() :
            typeof define === 'function' && define.amd ? define(factory) :
            (global.EscPosEncoder = factory());
        }(this, function() { 'use strict';
            const codepageMapping = {
                'utf8': 0, 'cp437': 1, 'cp850': 2, 'cp852': 3, 'cp857': 4, 'cp858': 5,
                'cp860': 6, 'cp863': 7, 'cp866': 8, 'cp1252': 9, 'iso88591': 10
            };
            class EscPosEncoder {
                constructor() {
                    this._buffer = [];
                    this._codepage = 'utf8';
                    this._align = 'left';
                }
                _queue(data) { this._buffer = this._buffer.concat(Array.isArray(data) ? data : [data]); return this; }
                _textEncoder() { return new TextEncoder(); }
                initialize() { 
                    this._queue([0x1b, 0x40]); // ESC @ 初始化打印机
                    // 不再强制设置 UTF-8，由 codepage 控制
                    return this; 
                }
                codepage(cp) { 
                    if (cp === 'gbk') {
                        // 发送 FS & 命令进入汉字模式 (多数中文热敏打印机支持)
                        this._queue([0x1c, 0x26]);
                        this._codepage = 'gbk';
                        return this;
                    }
                    const code = codepageMapping[cp] || 0; 
                    this._queue([0x1b, 0x74, code]); 
                    this._codepage = cp; 
                    return this; 
                }
                align(value) { 
                    const alignMap = { left: 0, center: 1, right: 2 }; 
                    if (alignMap[value] !== undefined) { 
                        this._queue([0x1b, 0x61, alignMap[value]]); 
                        this._align = value; 
                    } 
                    return this; 
                }
                bold(enabled = true) { this._queue([0x1b, 0x45, enabled ? 1 : 0]); return this; }
                underline(enabled = true) { this._queue([0x1b, 0x2d, enabled ? 1 : 0]); return this; }
                size(width = 1, height = 1) { 
                    if (width >= 1 && width <= 8 && height >= 1 && height <= 8) { 
                        const n = ((width - 1) << 4) | (height - 1); 
                        this._queue([0x1d, 0x21, n]); 
                    } 
                    return this; 
                }
                line(text = '') { 
                    if (text.length) { 
                        let bytes;
                        if (this._codepage === 'gbk' && typeof Encoding !== 'undefined') {
                            // 使用 encoding.js 将字符串转为 GB18030 (兼容 GBK) 字节数组
                            const unicodeArray = Encoding.stringToCode(text);
                            bytes = Encoding.convert(unicodeArray, { to: 'GB18030', from: 'UNICODE', type: 'array' });
                        } else {
                            bytes = Array.from(this._textEncoder().encode(text));
                        }
                        this._queue(bytes); 
                    } 
                    this._queue([0x0a]); 
                    return this; 
                }
                raw(data) { this._queue(data); return this; }
                cut(mode = 'full') { 
                    const cutMap = { full: 0x00, partial: 0x01 }; 
                    this._queue([0x1d, 0x56, cutMap[mode] || 0x00]); 
                    return this; 
                }
                encode() { return new Uint8Array(this._buffer); }
            }
            return EscPosEncoder;
        }));
        console.log('✅ 内嵌打印库已就绪 (增强中文 GBK 支持)');
    </script>

        /* 原有样式保持不变，此处省略以节省篇幅，实际使用时请完整保留原 style 内容 */

<body>

<!-- 页面结构保持不变，仅修改了 JavaScript 部分 -->
<header>
    <h1>🐱 玦泥泥猫屎宝</h1>
    <div class="header-buttons">
        <button onclick="exportData()" title="导出数据">💾 导出</button>
        <button onclick="importData()" title="导入数据">📂 导入</button>
        <button onclick="manualSyncToFirebase()" title="同步到云端" style="background-color: #e3f2fd; color: #1976d2;">🔄 同步</button>
        <button onclick="clearAllData()" title="清空所有数据" style="background-color: #ffebee; color: #d32f2f;">🗑️ 清空</button>
        <button onclick="showOrders()">🐱 查看订单</button>
        <button onclick="openModal('manageModal')">🐱 咪咪管理</button>
    </div>
</header>

<div class="status-bar" id="db-status">
    <span id="status-text">正在连接数据库...</span>
    <div></div>
</div>

<div class="main-container">
    <!-- 左侧商品区 -->
    <div class="product-section">
        <div class="filter-container">
            <div class="filter-bar" id="mainFilterBar"></div>
            <div class="sub-filter-bar" id="subFilterBar"></div>
        </div>
        <div class="product-grid" id="productGrid">
            <div class="no-products"><div>正在加载商品...</div></div>

    <!-- 右侧购物车 -->

        <div class="cart-header">🛒 购物车</div>
        <div class="cart-items" id="cartItems">
            <div style="text-align: center; color: #999; margin-top: 50px;">购物车为空</div>
        </div>
        <div class="cart-footer">
            <div class="total-price">
                <span>总计:</span>
                <span class="total-amount" id="totalAmount">¥ 0.00</span>

                <button class="btn-clear" onclick="clearCart()">清空购物车</button>
                <button class="btn-checkout" onclick="checkout()">下单结算</button>

            <button class="btn-print" onclick="printCurrentCart()">🧾 打印小票 (预览)</button>

<!-- 所有 Modal 结构保持不变，此处省略，实际使用时请完整保留 -->

<script>
    // ==================== 全局变量与初始化（与原逻辑一致，仅修改打印相关函数） ====================
    const DB_KEYS = {
        PRODUCTS: 'cat_shit_bao_products',
        ORDERS: 'cat_shit_bao_orders',
        ORDER_COUNTER: 'cat_shit_bao_order_counter',
        CATEGORIES: 'cat_shit_bao_categories'
    };

    const FIREBASE_CONFIG = {
        databaseURL: "https://jnnxm-f9492-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };

    let products = [];
    let orders = [];
    let cart = {};
    let orderCounter = 1;
    let categoryData = []; 
    let currentFilterMain = 'all';
    let currentFilterSub = 'all';
    let firebaseApp = null;
    let firebaseDb = null;
    let firebaseInitialized = false;
    
    const DEFAULT_CATEGORIES = [
        { name: '吧唧', subs: [] },
        { name: '亚克力', subs: [] },
        { name: '滴胶', subs: [] },
        { name: '色纸', subs: [] },
        { name: '本子', subs: [] },
        { name: '其他', subs: [] }
    ];

    const PRINT_SERVICE_UUID = '000018f0-0000-1000-8000-00805f9b34fb';
    const PRINT_CHARACTERISTIC_UUID = '00002af1-0000-1000-8000-00805f9b34fb';
    let printerCharacteristic = null;
    let selectedManageCatIndex = -1;

    // 辅助函数
    function updateStatus(msg, isError=false) {
        const el = document.getElementById('status-text');
        if (el) el.innerHTML = isError ? `<span style="color:#ff6b6b;">⚠️ ${msg}</span>` : `<span style="color:green;">✅ ${msg}</span>`;
    }
    function showLoading() { document.getElementById('status-text').innerHTML = '<div class="loader"></div>加载中...'; }
    function handleImageError(img) { img.onerror=null; img.parentElement.innerHTML='<div class="no-image">图片加载失败</div>'; }
    function previewImage(inpId, prevId) {
        const inp = document.getElementById(inpId), prev = document.getElementById(prevId);
        if(!inp||!prev) return;
        const url = inp.value.trim();
        if(url) { prev.src=url; prev.style.display='block'; prev.onerror=()=>prev.style.display='none'; }
        else { prev.style.display='none'; prev.src=''; }
    }
    function openModal(id) {
        const modal = document.getElementById(id);
        if (modal) modal.style.display = 'flex';
        if(id === 'addModal') updateCategorySelects('newProdCat', 'newProdSubCat');
        if(id === 'manageModal') updateManageTable();
        if(id === 'ordersModal') showOrders();
        if(id === 'categoryManageModal') { renderManageCatList(); document.getElementById('subCatManageArea').style.display='none'; }
    }
    function closeModal(id) { document.getElementById(id).style.display='none'; }
    window.onclick = (e) => { if(e.target.classList.contains('modal')) e.target.style.display='none'; };

    // 数据存储相关函数（原封不动）
    function loadFromStorage() {
        try {
            const sp = localStorage.getItem(DB_KEYS.PRODUCTS); if(sp) { products=JSON.parse(sp); products.forEach(p=>{if(!p.imageUrl)p.imageUrl='';}); }
            const so = localStorage.getItem(DB_KEYS.ORDERS); if(so) orders=JSON.parse(so);
            const sc = localStorage.getItem(DB_KEYS.ORDER_COUNTER); if(sc) orderCounter=parseInt(sc)||1;
            const cats = localStorage.getItem(DB_KEYS.CATEGORIES); if(cats) categoryData=JSON.parse(cats); else categoryData=JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
            return true;
        } catch(e) { updateStatus('加载数据失败',true); return false; }
    }
    function saveToStorage() {
        try {
            localStorage.setItem(DB_KEYS.PRODUCTS, JSON.stringify(products));
            localStorage.setItem(DB_KEYS.ORDERS, JSON.stringify(orders));
            localStorage.setItem(DB_KEYS.ORDER_COUNTER, orderCounter.toString());
            localStorage.setItem(DB_KEYS.CATEGORIES, JSON.stringify(categoryData));
        } catch(e) {}
    }

    // Firebase 相关（不变）
    async function initializeFirebase() {
        try {
            showLoading();
            const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js");
            const { getDatabase } = await import("https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js");
            firebaseApp = initializeApp(FIREBASE_CONFIG, "cat_shit_bao");
            firebaseDb = getDatabase(firebaseApp);
            firebaseInitialized = true;
            updateStatus('Firebase连接成功');
            await setupFirebaseListeners();
            return true;
        } catch(e) { updateStatus('Firebase连接失败，使用本地模式',true); return false; }
    }
    async function setupFirebaseListeners() {
        if(!firebaseDb) return;
        const { ref, onValue } = await import("https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js");
        onValue(ref(firebaseDb, 'products'), (snap) => {
            const data = snap.val(); if(data) { products = Object.values(data); products.forEach(p=>{if(!p.imageUrl)p.imageUrl='';}); saveToStorage(); renderProducts(currentFilterMain, currentFilterSub); }
        });
        onValue(ref(firebaseDb, 'categories'), (snap) => {
            const data = snap.val(); if(data && Array.isArray(data)) { categoryData = data; saveToStorage(); renderCategoryFilters(); }
        });
    }
    async function syncProductsToFirebase() {
        if(!firebaseInitialized) return;
        try { const { ref, set } = await import("https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js"); const obj = {}; products.forEach(p=>obj[p.id]=p); await set(ref(firebaseDb, 'products'), obj); } catch(e) {}
    }
    async function syncCategoriesToFirebase() {
        if(!firebaseInitialized) return;
        try { const { ref, set } = await import("https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js"); await set(ref(firebaseDb, 'categories'), categoryData); } catch(e) {}
    }

    // 渲染分类筛选（不变）
    function renderCategoryFilters() {
        const bar = document.getElementById('mainFilterBar'); bar.innerHTML = '';
        const allBtn = document.createElement('button'); allBtn.className=`filter-btn ${currentFilterMain==='all'?'active':''}`; allBtn.textContent='全部'; allBtn.onclick=()=>filterProducts('all'); bar.appendChild(allBtn);
        categoryData.forEach(cat=>{ const btn=document.createElement('button'); btn.className=`filter-btn ${currentFilterMain===cat.name?'active':''}`; btn.textContent=cat.name; btn.onclick=()=>filterProducts(cat.name); bar.appendChild(btn); });
        const addBtn=document.createElement('button'); addBtn.className='filter-btn'; addBtn.style.marginLeft='auto'; addBtn.style.backgroundColor='var(--primary-color)'; addBtn.style.color='white'; addBtn.innerHTML='+ 添加商品'; addBtn.onclick=()=>{ openModal('addModal'); }; bar.appendChild(addBtn);
        renderSubFilterBar();
    }
    function renderSubFilterBar() {
        const bar = document.getElementById('subFilterBar'); bar.innerHTML = '';
        if(currentFilterMain==='all') return;
        const cat = categoryData.find(c=>c.name===currentFilterMain);
        if(cat && cat.subs && cat.subs.length) {
            const allSub = document.createElement('button'); allSub.className=`sub-filter-btn ${currentFilterSub==='all'?'active':''}`; allSub.textContent='全部子类'; allSub.onclick=()=>filterProducts(currentFilterMain,'all'); bar.appendChild(allSub);
            cat.subs.forEach(sub=>{ const b=document.createElement('button'); b.className=`sub-filter-btn ${currentFilterSub===sub?'active':''}`; b.textContent=sub; b.onclick=()=>filterProducts(currentFilterMain,sub); bar.appendChild(b); });
        }
    }
    function filterProducts(cat, sub='all') { currentFilterMain=cat; currentFilterSub=sub; renderCategoryFilters(); renderProducts(cat,sub); }

    // 渲染商品（不变）
    function renderProducts(cat='all', sub='all') {
        const grid = document.getElementById('productGrid'); grid.innerHTML='';
        let filtered = products;
        if(cat!=='all') { filtered = filtered.filter(p=>p.category===cat); if(sub!=='all') filtered = filtered.filter(p=>p.subCategory===sub); }
        if(filtered.length===0) { grid.innerHTML=`<div class="no-products"><div>暂无商品</div><button onclick="openModal('addModal')" style="background:var(--primary-color); color:white; margin-top:10px;">+ 添加商品</button></div>`; return; }
        filtered.forEach(p=>{
            const card = document.createElement('div'); card.className='product-card'; card.onclick=()=>addToCart(p.id);
            let imgHtml = p.imageUrl ? `<div class="product-image-container"><img class="product-image" src="${p.imageUrl}" onerror="handleImageError(this)"></div>` : `<div class="product-image-container"><div class="no-image">暂无图片</div></div>`;
            let subTag = p.subCategory ? `<span class="product-sub-tag">${p.subCategory}</span>` : '';
            card.innerHTML = `<span class="product-stock">库存: ${p.stock}</span><div class="product-tag-container"><span class="product-tag">${p.category}</span>${subTag}</div>${imgHtml}<span class="product-price">¥ ${p.price.toFixed(2)}</span><div class="product-name">${p.name}</div>`;
            grid.appendChild(card);
        });
    }

    // 购物车逻辑（不变）
    function renderCart() {
        const container = document.getElementById('cartItems'); container.innerHTML=''; let total=0, empty=true;
        for(let [id,qty] of Object.entries(cart)) {
            if(qty>0) { empty=false; const p=products.find(p=>p.id==id); if(p) { total+=p.price*qty;
                const item=document.createElement('div'); item.className='cart-item';
                item.innerHTML=`<div class="cart-item-info"><div class="cart-item-name">${p.name}</div><div class="cart-item-price">¥ ${p.price.toFixed(2)} x ${qty}</div></div><div class="cart-controls"><button class="qty-btn" onclick="updateQty(${id},-1)">-</button><span>${qty}</span><button class="qty-btn" onclick="updateQty(${id},1)">+</button></div>`;
                container.appendChild(item);
            }}
        }
        if(empty) container.innerHTML='<div style="text-align:center;color:#999;margin-top:50px;">购物车为空</div>';
        document.getElementById('totalAmount').innerText = `¥ ${total.toFixed(2)}`;
    }
    function addToCart(id) { const p=products.find(p=>p.id===id); if(!p) return; if(p.stock<=0) { alert(`"${p.name}" 库存不足`); return; } cart[id] = (cart[id]||0)+1; renderCart(); }
    function updateQty(id, ch) {
        if(cart[id]) { cart[id]+=ch; if(cart[id]<=0) delete cart[id]; else { const p=products.find(p=>p.id==id); if(p && cart[id]>p.stock) { cart[id]=p.stock; alert(`库存只有 ${p.stock} 个`); } } renderCart(); }
    }
    function clearCart() { if(Object.keys(cart).length===0) { alert('购物车已经是空的'); return; } if(confirm('清空购物车？')) { cart={}; renderCart(); } }

    // 订单（结算等不变）
    function checkout() {
        if(Object.keys(cart).length===0) { alert('购物车是空的'); return; }
        for(let [id,qty] of Object.entries(cart)) { const p=products.find(p=>p.id==id); if(p && qty>p.stock) { alert(`"${p.name}" 库存不足`); return; } }
        const list=document.getElementById('confirmList'); list.innerHTML=''; let total=0;
        for(let [id,qty] of Object.entries(cart)) { const p=products.find(p=>p.id==id); if(p) { total+=p.price*qty; const d=document.createElement('div'); d.style.display='flex'; d.style.justifyContent='space-between'; d.innerHTML=`<span>${p.name} x${qty}</span><span>¥ ${(p.price*qty).toFixed(2)}</span>`; list.appendChild(d); } }
        document.getElementById('confirmTotal').innerText=`¥ ${total.toFixed(2)}`;
        document.getElementById('orderSuccessMessage').style.display='none';
        openModal('confirmModal');
    }
    async function processOrder() {
        document.getElementById('orderSuccessMessage').style.display='block';
        let total=0, items=[];
        for(let [id,qty] of Object.entries(cart)) { const p=products.find(p=>p.id==id); if(p) { const it=p.price*qty; total+=it; items.push({productId:p.id, name:p.name, quantity:qty, price:p.price, total:it}); } }
        const now = new Date(), timeStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        const orderNo = orderCounter.toString().padStart(3,'0');
        const order = { id:orderCounter, orderNo, time:timeStr, items, total };
        orders.unshift(order); orderCounter++;
        for(let [id,qty] of Object.entries(cart)) { const p=products.find(p=>p.id==id); if(p) { p.stock-=qty; if(p.stock<0) p.stock=0; } }
        saveToStorage(); renderProducts(currentFilterMain, currentFilterSub);
        if(firebaseInitialized) { try { await syncProductsToFirebase(); const { ref, push, set } = await import("https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js"); await set(push(ref(firebaseDb, 'orders')), { orderNo, time:timeStr, items, total, status:'completed' }); } catch(e) {} }
        
        closeModal('confirmModal');
        cart = {};
        renderCart();
        alert(`订单 #${orderNo} 提交成功！`);
        
        try {
            await printOrderReceipt(order);
        } catch(e) {
            console.error('自动打印失败:', e);
            updateStatus('打印失败，可手动重试', true);
        }
    }
    function showOrders() {
        const tbody = document.querySelector('#ordersTable tbody'); tbody.innerHTML='';
        if(orders.length===0) { tbody.innerHTML='<tr><td colspan="5" style="text-align:center;padding:20px;color:#999;">暂无订单</td></tr>'; document.getElementById('orderCount').textContent='0'; return; }
        orders.forEach(o=>{ const tr=document.createElement('tr'); tr.innerHTML=`<td>${o.orderNo}</td><td>${o.time}</td><td>${o.items.reduce((s,i)=>s+i.quantity,0)} 件</td><td>¥ ${o.total.toFixed(2)}</td><td><button onclick="viewOrderDetails(${o.id})">查看</button></td>`; tbody.appendChild(tr); });
        document.getElementById('orderCount').textContent=orders.length;
    }
    function viewOrderDetails(id) { const o=orders.find(o=>o.id===id); if(!o) return; let det=`订单号:${o.orderNo}\n时间:${o.time}\n`; o.items.forEach(i=>det+=`${i.name} x${i.quantity} ¥${i.total.toFixed(2)}\n`); det+=`合计:¥${o.total.toFixed(2)}`; alert(det); }

    // 商品管理（不变）
    function updateCategorySelects(mainId, subId, selMain='', selSub='') {
        const main=document.getElementById(mainId); if(!main) return; main.innerHTML=''; 
        categoryData.forEach(c=>{ const opt=document.createElement('option'); opt.value=c.name; opt.textContent=c.name; if(c.name===selMain) opt.selected=true; main.appendChild(opt); });
        updateSubCatSelect(mainId, subId, selSub);
    }
    function updateSubCatSelect(mainId, subId, selSub='') {
        const main=document.getElementById(mainId), sub=document.getElementById(subId);
        if(!main || !sub) return;
        const cat=categoryData.find(c=>c.name===main.value); sub.innerHTML='<option value="">无子分类</option>';
        if(cat && cat.subs) cat.subs.forEach(s=>{ const opt=document.createElement('option'); opt.value=s; opt.textContent=s; if(s===selSub) opt.selected=true; sub.appendChild(opt); });
    }
    async function addProduct() {
        const name=document.getElementById('newProdName').value.trim(), cat=document.getElementById('newProdCat').value, sub=document.getElementById('newProdSubCat').value;
        const img=document.getElementById('newProdImageUrl').value.trim(), price=parseFloat(document.getElementById('newProdPrice').value), stock=parseInt(document.getElementById('newProdStock').value);
        if(!name) { alert('请输入商品名称'); return; } if(isNaN(price)||price<=0) { alert('价格无效'); return; } if(isNaN(stock)||stock<0) { alert('库存无效'); return; }
        const exist=products.find(p=>p.name.toLowerCase()===name.toLowerCase());
        if(exist) { if(confirm(`"${name}"已存在，更新库存？`)) { exist.stock+=stock; saveToStorage(); renderProducts(); closeModal('addModal'); if(firebaseInitialized) await syncProductsToFirebase(); } return; }
        const newId = products.length ? Math.max(...products.map(p=>p.id))+1 : 1;
        products.push({ id:newId, name, category:cat, subCategory:sub, imageUrl:img, price, stock });
        saveToStorage(); renderProducts(); closeModal('addModal');
        ['newProdName','newProdImageUrl','newProdPrice'].forEach(id=>document.getElementById(id).value='');
        document.getElementById('newProdStock').value='10'; document.getElementById('newProdImagePreview').style.display='none';
        if(firebaseInitialized) await syncProductsToFirebase();
    }
    function updateManageTable() {
        const tbody=document.querySelector('#manageTable tbody'); tbody.innerHTML='';
        if(!products.length) { tbody.innerHTML='<tr><td colspan="7" style="text-align:center;">暂无商品</td></tr>'; document.getElementById('productCount').textContent='0'; return; }
        products.forEach(p=>{
            const tr=document.createElement('tr'); let catD=p.category+(p.subCategory?` / ${p.subCategory}`:'');
            let imgCell='<td>无图片</td>'; if(p.imageUrl) imgCell=`<td><div style="width:40px;height:40px;"><img src="${p.imageUrl}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='图片失效'"></div></td>`;
            tr.innerHTML=`<td>${p.id}</td><td>${p.name}</td>${imgCell}<td>${catD}</td><td>¥${p.price.toFixed(2)}</td><td>${p.stock}</td><td><button onclick="deleteProduct(${p.id})">删除</button> <button onclick="editProduct(${p.id})">编辑</button></td>`;
            tbody.appendChild(tr);
        });
        document.getElementById('productCount').textContent=products.length;
    }
    async function deleteProduct(id) {
        const p=products.find(p=>p.id===id); if(!p) return; if(!confirm(`删除 "${p.name}"？`)) return;
        products=products.filter(p=>p.id!==id); if(cart[id]) delete cart[id];
        saveToStorage(); renderProducts(); renderCart(); updateManageTable();
        if(firebaseInitialized) await syncProductsToFirebase();
    }
    function editProduct(id) {
        const p=products.find(p=>p.id===id); if(!p) return;
        document.getElementById('editProdId').value=id; document.getElementById('editProdName').value=p.name;
        document.getElementById('editProdImageUrl').value=p.imageUrl||''; document.getElementById('editProdPrice').value=p.price;
        document.getElementById('editProdStock').value=p.stock;
        updateCategorySelects('editProdCat','editProdSubCat', p.category, p.subCategory||'');
        const prev=document.getElementById('editProdImagePreview'); if(p.imageUrl) { prev.src=p.imageUrl; prev.style.display='block'; } else prev.style.display='none';
        openModal('editModal');
    }
    async function saveEditedProduct() {
        const id=parseInt(document.getElementById('editProdId').value), name=document.getElementById('editProdName').value.trim();
        const cat=document.getElementById('editProdCat').value, sub=document.getElementById('editProdSubCat').value;
        const img=document.getElementById('editProdImageUrl').value.trim(), price=parseFloat(document.getElementById('editProdPrice').value), stock=parseInt(document.getElementById('editProdStock').value);
        if(!name||isNaN(price)||price<=0||isNaN(stock)||stock<0) { alert('信息不完整'); return; }
        const p=products.find(p=>p.id===id); if(!p) return;
        if(products.some(x=>x.id!==id && x.name.toLowerCase()===name.toLowerCase())) { alert('名称重复'); return; }
        Object.assign(p, { name, category:cat, subCategory:sub, imageUrl:img, price, stock });
        saveToStorage(); renderProducts(); renderCart(); updateManageTable();
        if(firebaseInitialized) await syncProductsToFirebase();
        closeModal('editModal');
    }

    // 分类管理（不变）
    function renderManageCatList() {
        const list=document.getElementById('manageCatList'); list.innerHTML='';
        categoryData.forEach((c,i)=>{ const d=document.createElement('div'); d.className=`cat-manage-item ${selectedManageCatIndex===i?'selected':''}`; d.innerText=c.name; d.onclick=()=>{ selectedManageCatIndex=i; renderManageCatList(); renderManageSubCatList(i); }; list.appendChild(d); });
    }
    function renderManageSubCatList(idx) {
        const cat=categoryData[idx]; document.getElementById('subCatManageArea').style.display='block';
        document.getElementById('selectedCatName').innerText=cat.name; const list=document.getElementById('manageSubCatList'); list.innerHTML='';
        if(!cat.subs||!cat.subs.length) list.innerHTML='<span>无子分类</span>';
        else cat.subs.forEach((s,i)=>{ const chip=document.createElement('div'); chip.className='sub-cat-chip'; chip.innerHTML=`${s} <span onclick="deleteSubCategory(${idx},${i})" style="cursor:pointer;color:red;">×</span>`; list.appendChild(chip); });
    }
    async function addMainCategory() {
        const name=document.getElementById('newCatNameInput').value.trim(); if(!name) return;
        if(categoryData.some(c=>c.name===name)) { alert('已存在'); return; }
        categoryData.push({ name, subs:[] }); saveToStorage(); if(firebaseInitialized) await syncCategoriesToFirebase();
        renderManageCatList(); renderCategoryFilters(); document.getElementById('newCatNameInput').value='';
    }
    async function deleteSelectedMainCategory() {
        if(selectedManageCatIndex===-1) return; const cat=categoryData[selectedManageCatIndex];
        if(products.some(p=>p.category===cat.name)) { alert('有商品使用此分类，无法删除'); return; }
        if(confirm(`删除 "${cat.name}"？`)) { categoryData.splice(selectedManageCatIndex,1); selectedManageCatIndex=-1; document.getElementById('subCatManageArea').style.display='none'; saveToStorage(); if(firebaseInitialized) await syncCategoriesToFirebase(); renderManageCatList(); renderCategoryFilters(); }
    }
    async function addSubCategory() {
        if(selectedManageCatIndex===-1) return; const name=document.getElementById('newSubCatNameInput').value.trim(); if(!name) return;
        const cat=categoryData[selectedManageCatIndex]; if(!cat.subs) cat.subs=[];
        if(cat.subs.includes(name)) { alert('已存在'); return; }
        cat.subs.push(name); saveToStorage(); if(firebaseInitialized) await syncCategoriesToFirebase();
        renderManageSubCatList(selectedManageCatIndex); renderCategoryFilters(); document.getElementById('newSubCatNameInput').value='';
    }
    async function deleteSubCategory(catIdx, subIdx) {
        event.stopPropagation(); const cat=categoryData[catIdx], sub=cat.subs[subIdx];
        if(products.some(p=>p.category===cat.name && p.subCategory===sub)) { alert('有商品使用此子分类'); return; }
        if(confirm(`删除 "${sub}"？`)) { cat.subs.splice(subIdx,1); saveToStorage(); if(firebaseInitialized) await syncCategoriesToFirebase(); renderManageSubCatList(catIdx); renderCategoryFilters(); }
    }

    // 数据导入导出（不变）
    function exportData() {
        const data = { products, orders, orderCounter, categories: categoryData, exportTime: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `猫屎宝数据_${new Date().toISOString().slice(0,10)}.json`; a.click();
    }
    function importData() {
        const inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
        inp.onchange = async (e) => {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if(!data.products || !Array.isArray(data.products)) { alert('格式错误'); return; }
                    if(confirm(`导入 ${data.products.length} 个商品？`)) {
                        products = data.products; orders = data.orders || []; orderCounter = data.orderCounter || 1;
                        categoryData = data.categories || DEFAULT_CATEGORIES;
                        products.forEach(p=>{ if(!p.imageUrl) p.imageUrl=''; });
                        saveToStorage(); renderCategoryFilters(); renderProducts();
                        if(firebaseInitialized) { await syncProductsToFirebase(); await syncCategoriesToFirebase(); }
                    }
                } catch(ex) { alert('导入失败'); }
            };
            reader.readAsText(file);
        };
        inp.click();
    }
    async function clearAllData() {
        if(!confirm('清空所有数据？不可恢复！')) return;
        if(!confirm('再次确认清空？')) return;
        products=[]; orders=[]; cart={}; orderCounter=1; categoryData=JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
        saveToStorage(); renderCategoryFilters(); renderProducts(); renderCart();
        if(firebaseInitialized) { const { ref, set } = await import("https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js"); await set(ref(firebaseDb, 'products'), {}); await set(ref(firebaseDb, 'categories'), categoryData); }
    }
    async function manualSyncToFirebase() { if(!firebaseInitialized) return alert('Firebase未连接'); await syncProductsToFirebase(); await syncCategoriesToFirebase(); alert('同步完成'); }

    // ==================== 蓝牙打印 (核心修改：使用 GBK 编码) ====================
    async function connectPrinter() {
        if(!navigator.bluetooth) throw new Error('浏览器不支持Web Bluetooth');
        updateStatus('搜索蓝牙打印机...');
        try {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ services: [PRINT_SERVICE_UUID] }], optionalServices: [PRINT_SERVICE_UUID] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(PRINT_SERVICE_UUID);
            printerCharacteristic = await service.getCharacteristic(PRINT_CHARACTERISTIC_UUID);
            updateStatus('✅ 打印机已连接');
            return printerCharacteristic;
        } catch {
            updateStatus('尝试通用连接...');
            const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [PRINT_SERVICE_UUID] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(PRINT_SERVICE_UUID);
            printerCharacteristic = await service.getCharacteristic(PRINT_CHARACTERISTIC_UUID);
            updateStatus('✅ 打印机已连接 (通用)');
            return printerCharacteristic;
        }
    }

    // 生成小票数据（关键：使用 codepage('gbk')）
    function generateReceiptData(orderInfo) {
        const encoder = new EscPosEncoder();
        let result = encoder
            .initialize()
            .codepage('gbk')                // 切换到 GBK 汉字模式
            .align('center')
            .line('《玦泥泥小猫饭屋》')
            .line('--------------------------------')
            .align('left');
        
        if(orderInfo.orderNo) {
            result.line(`订单号: ${orderInfo.orderNo}`);
            result.line(`时间: ${orderInfo.time || new Date().toLocaleString()}`);
            result.line('--------------------------------');
        }
        
        orderInfo.items.forEach(item => {
            const name = item.name.length > 10 ? item.name.substring(0, 8) + '..' : item.name;
            const qty = `x${item.quantity}`;
            const price = `¥${item.total.toFixed(2)}`;
            const leftPart = `${name} ${qty}`;
            const spaces = Math.max(1, 32 - leftPart.length - price.length);
            const line = leftPart + ' '.repeat(spaces) + price;
            result.line(line);
        });
        
        result.line('--------------------------------')
              .align('right')
              .line(`总计: ¥${orderInfo.total.toFixed(2)}`)
              .align('center')
              .line('感谢惠顾！')
              .line(' ')
              .cut();
        
        return result.encode();
    }

    async function printCurrentCart() {
        if(!Object.keys(cart).length) { alert('购物车为空'); return; }
        try {
            if(!printerCharacteristic) await connectPrinter();
            let items=[], total=0;
            for(let [id,qty] of Object.entries(cart)) { const p=products.find(p=>p.id==id); if(p) { const t=p.price*qty; total+=t; items.push({name:p.name, quantity:qty, price:p.price, total:t}); } }
            const data = generateReceiptData({ items, total, time: new Date().toLocaleString() });
            await printerCharacteristic.writeValue(data);
            updateStatus('✅ 小票打印成功'); alert('打印指令已发送');
        } catch(e) { alert('打印失败: '+e.message); updateStatus('打印失败', true); printerCharacteristic=null; }
    }

    async function printOrderReceipt(order) {
        try {
            if(!printerCharacteristic) await connectPrinter();
            const data = generateReceiptData(order);
            await printerCharacteristic.writeValue(data);
            updateStatus('✅ 订单打印成功');
            return true;
        } catch(e) {
            updateStatus('打印失败', true);
            throw e;
        }
    }

    // 初始化（不变）
    async function initApp() {
        showLoading();
        if(!loadFromStorage()) {
            products = [ { id:1, name:'刀宗吧唧', category:'吧唧', subCategory:'', imageUrl:'https://via.placeholder.com/200x200/FF9A9E/FFFFFF?text=刀宗吧唧', price:8, stock:20 }, { id:2, name:'手机支架', category:'亚克力', subCategory:'', imageUrl:'https://via.placeholder.com/200x200/FAD0C4/FFFFFF?text=支架', price:35, stock:4 } ];
            saveToStorage();
        }
        categoryData.forEach(c=>{ if(!c.subs) c.subs=[]; });
        setTimeout(async ()=>{ await initializeFirebase(); if(products.length && firebaseInitialized) { await syncProductsToFirebase(); await syncCategoriesToFirebase(); } }, 1000);
        renderCategoryFilters(); renderProducts(); renderCart();
        updateStatus(`已加载 ${products.length} 个商品`);
    }
    document.addEventListener('DOMContentLoaded', ()=>setTimeout(initApp, 300));
</script>
