    <!-- 优先尝试主要CDN，失败后备用 -->
    <script>
        // 确保 ESC/POS 编码库加载
        window.escposEncoderLoaded = false;
        function loadEscPosEncoder(callback) {
            if (typeof EscPosEncoder !== 'undefined') {
                window.escposEncoderLoaded = true;
                if (callback) callback();
                return;
            }
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/escpos-encoder@1.0.0/dist/escpos-encoder.min.js';
            script.onload = function() {
                window.escposEncoderLoaded = true;
                console.log('ESC/POS 库加载成功');
                if (callback) callback();
            };
            script.onerror = function() {
                console.warn('主CDN加载失败，尝试备用...');
                const backupScript = document.createElement('script');
                backupScript.src = 'https://unpkg.com/escpos-encoder@1.0.0/dist/escpos-encoder.min.js';
                backupScript.onload = function() {
                    window.escposEncoderLoaded = true;
                    console.log('备用库加载成功');
                    if (callback) callback();
                };
                backupScript.onerror = function() {
                    console.error('所有CDN均失败，无法打印');
                    alert('打印组件加载失败，请检查网络后刷新重试。');
                };
                document.head.appendChild(backupScript);
            };
            document.head.appendChild(script);
        }
        // 页面初始化时就开始加载
        loadEscPosEncoder();
    </script>

<script>
    // ==================== 全局变量与初始化 (保持不变) ====================
    const DB_KEYS = {
        PRODUCTS: 'cat_shit_bao_products',
        ORDERS: 'cat_shit_bao_orders',
        ORDER_COUNTER: 'cat_shit_bao_order_counter',
        CATEGORIES: 'cat_shit_bao_categories'
    };

    const FIREBASE_CONFIG = {
        databaseURL: "https://jnnxm-f9492-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };

    let products = [];
    let orders = [];
    let cart = {};
    let orderCounter = 1;
    let categoryData = [];
    let currentFilterMain = 'all';
    let currentFilterSub = 'all';
    let firebaseApp = null;
    let firebaseDb = null;
    let firebaseInitialized = false;

    const DEFAULT_CATEGORIES = [
        { name: '吧唧', subs: [] }, { name: '亚克力', subs: [] }, { name: '滴胶', subs: [] },
        { name: '色纸', subs: [] }, { name: '本子', subs: [] }, { name: '其他', subs: [] }
    ];

    // 蓝牙打印机相关
    const PRINT_SERVICE_UUID = '000018f0-0000-1000-8000-00805f9b34fb';
    const PRINT_CHARACTERISTIC_UUID = '00002af1-0000-1000-8000-00805f9b34fb';
    let printerCharacteristic = null;

    // ==================== 改进后的打印核心函数 ====================
    
    // 确保库已加载的异步函数
    async function ensureEscPosLibrary() {
        if (typeof EscPosEncoder !== 'undefined') {
            return true;
        }
        // 如果尚未加载，动态加载
        updateStatus('加载打印组件...');
        return new Promise((resolve) => {
            loadEscPosEncoder(() => {
                if (typeof EscPosEncoder !== 'undefined') {
                    updateStatus('打印组件就绪');
                    resolve(true);
                } else {
                    updateStatus('打印组件加载失败', true);
                    resolve(false);
                }
            });
        });
    }

    // 连接蓝牙打印机
    async function connectBluetoothPrinter() {
        if (!navigator.bluetooth) {
            throw new Error('您的浏览器不支持Web Bluetooth，请使用Chrome或Edge。');
        }
        updateStatus('正在搜索蓝牙打印机...');
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: [PRINT_SERVICE_UUID] }],
                optionalServices: [PRINT_SERVICE_UUID]
            });
            updateStatus('正在连接打印机...');
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(PRINT_SERVICE_UUID);
            const characteristic = await service.getCharacteristic(PRINT_CHARACTERISTIC_UUID);
            printerCharacteristic = characteristic;
            updateStatus('✅ 打印机已连接');
            return characteristic;
        } catch (error) {
            // 如果标准UUID失败，尝试无过滤方式
            console.warn('标准UUID连接失败，尝试无过滤搜索...');
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [PRINT_SERVICE_UUID]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(PRINT_SERVICE_UUID);
            const characteristic = await service.getCharacteristic(PRINT_CHARACTERISTIC_UUID);
            printerCharacteristic = characteristic;
            updateStatus('✅ 打印机已连接 (通用模式)');
            return characteristic;
        }
    }

    // 生成打印数据 (ESC/POS)
    function generateReceiptData(orderInfo) {
        if (typeof EscPosEncoder === 'undefined') {
            throw new Error('打印库未加载，请刷新页面重试。');
        }
        let encoder = new EscPosEncoder();
        let result = encoder
            .initialize()
            .codepage('utf8')
            .align('center')
            .line('殃泥泥猫屎宝')
            .line('================')
            .align('left');
        
        if (orderInfo.orderNo) {
            result.line(`订单号: ${orderInfo.orderNo}`);
            result.line(`时间: ${orderInfo.time || new Date().toLocaleString()}`);
            result.line('----------------');
        }
        result.line('商品           数量  小计');
        let items = orderInfo.items || [];
        items.forEach(item => {
            let name = item.name.length > 8 ? item.name.substring(0, 6) + '..' : item.name.padEnd(8, ' ');
            let qty = item.quantity.toString().padStart(3, ' ');
            let price = `¥${item.total.toFixed(2)}`;
            result.line(`${name}  ${qty}  ${price}`);
        });
        result.line('----------------');
        result.align('right').line(`总计: ¥${orderInfo.total.toFixed(2)}`);
        result.align('center').line('感谢惠顾！').line(' ').cut();
        return result.encode();
    }

    async function sendToPrinter(data) {
        if (!printerCharacteristic) throw new Error('打印机未连接');
        await printerCharacteristic.writeValue(data);
        console.log('打印指令已发送');
    }

    // 打印当前购物车内容
    async function printCurrentCart() {
        if (Object.keys(cart).length === 0) {
            alert('购物车是空的，无法打印');
            return;
        }
        // 确保库加载
        const libReady = await ensureEscPosLibrary();
        if (!libReady) {
            alert('打印组件加载失败，请刷新页面后重试。');
            return;
        }
        try {
            if (!printerCharacteristic) {
                await connectBluetoothPrinter();
            }
            let items = [];
            let total = 0;
            for (const [id, qty] of Object.entries(cart)) {
                const product = products.find(p => p.id == id);
                if (product) {
                    const itemTotal = product.price * qty;
                    total += itemTotal;
                    items.push({ name: product.name, quantity: qty, price: product.price, total: itemTotal });
                }
            }
            const orderInfo = { items, total, time: new Date().toLocaleString('zh-CN', {hour12: false}) };
            const data = generateReceiptData(orderInfo);
            await sendToPrinter(data);
            updateStatus('✅ 小票打印成功');
            alert('打印指令已发送！');
        } catch (error) {
            console.error(error);
            alert('打印失败: ' + error.message);
            updateStatus('打印失败', true);
            printerCharacteristic = null;
        }
    }

    // 打印正式订单小票
    async function printOrderReceipt(order) {
        const libReady = await ensureEscPosLibrary();
        if (!libReady) {
            alert('打印组件未就绪，无法打印订单小票。');
            return false;
        }
        try {
            if (!printerCharacteristic) {
                await connectBluetoothPrinter();
            }
            const data = generateReceiptData(order);
            await sendToPrinter(data);
            updateStatus('✅ 订单小票打印成功');
            return true;
        } catch (error) {
            console.error(error);
            updateStatus('打印失败', true);
            return false;
        }
    }
